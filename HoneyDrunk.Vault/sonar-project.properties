# SonarQube Cloud project configuration for HoneyDrunk.Vault.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every PR and push to main.
#
# This file lives at HoneyDrunk.Vault/sonar-project.properties (inside the
# inner project subdir, next to HoneyDrunk.Vault.slnx). All sonar.sources /
# sonar.tests paths are relative to this subdir, which matches the
# working-directory the reusable job-sonarcloud.yml runs from.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Vault
sonar.projectName=HoneyDrunk.Vault

# Sources — runtime + all providers + EventGrid integration
sonar.sources=HoneyDrunk.Vault,HoneyDrunk.Vault.EventGrid,HoneyDrunk.Vault.Providers.AppConfiguration,HoneyDrunk.Vault.Providers.Aws,HoneyDrunk.Vault.Providers.AzureKeyVault,HoneyDrunk.Vault.Providers.Configuration,HoneyDrunk.Vault.Providers.File,HoneyDrunk.Vault.Providers.InMemory

# Tests — main test project plus the Canary cross-Node verification project
sonar.tests=HoneyDrunk.Vault.Tests,HoneyDrunk.Vault.Canary

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code and build outputs
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs

# New Code definition — inherits from organization default (30 days)
