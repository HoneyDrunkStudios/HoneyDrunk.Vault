name: Weekly Dependencies

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-deps:
    name: Weekly Dependencies
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/nightly-deps.yml@main
    with:
      check-dotnet-deps: true
      create-update-prs: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
